<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Reservas Turísticas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">Reservas Turísticas</a>
        <div class="nav-links" id="nav-links">
            <a href="/alojamientos.html">Alojamientos</a>
            <a href="/registro.html">Registrarse</a>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-card">
            <h2>Iniciar sesión</h2>
            <div id="alert" class="alert"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            <p class="form-footer">
                ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('alert');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await login(email, password);

            if (res.ok) {
                showAlert('alert', 'Login correcto. Redirigiendo...', 'success');
                setTimeout(() => window.location.href = BASE_PATH + '/', 1000);
            } else {
                showAlert('alert', res.data.error, 'error');
            }
        });
    </script>
</body>
</html>
