<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Reservas Turísticas</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">Reservas Turísticas</a>
        <div class="nav-links" id="nav-links">
            <a href="/alojamientos.html">Alojamientos</a>
            <a href="/login.html" class="btn-nav">Iniciar sesión</a>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-card">
            <h2>Crear cuenta</h2>
            <div id="alert" class="alert"></div>
            <form id="registro-form">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña (mín. 8 caracteres)</label>
                    <input type="password" id="password" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
            <p class="form-footer">
                ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('alert');

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await registro(nombre, email, password);

            if (res.ok) {
                showAlert('alert', 'Cuenta creada correctamente. Redirigiendo...', 'success');
                setTimeout(() => window.location.href = '/login.html', 1500);
            } else {
                showAlert('alert', res.data.error, 'error');
            }
        });
    </script>
</body>
</html>
